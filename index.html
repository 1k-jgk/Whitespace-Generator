<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Whitespace Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <h1>
    Whitespace Generator
  </h1>
  <h3>
    これはスペースやタブ、改行をSやT,Lに相互変換できるwhitespaceジェネレーターです。
  </h3>
  <h3>
    Sまたは、sがSPACE。Tまたは、tがTab。Lもしくは、lが改行に変換されます。
  </h3>
  <h3>
    その逆にも変換することができます。
  </h3>
  <h2>
    入力
  </h2>
  <textarea id="input" placeholder="相互入力可能"></textarea>
  <button id="convertButton">
    変換
  </button>
  <button id="copyButton">
    コピー
  </button>
  <button id="clearButton">
    全削除
  </button>
  <h2>
    出力
  </h2>
  <textarea id="output1" class="output" placeholder="コピー用"></textarea>
  <textarea id="output2" class="output" placeholder="確認用"></textarea>
</body>
</html>
